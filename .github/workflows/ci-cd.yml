name: CI pipeline

on:
  push: 
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js 
        uses: actions/setup-node@v4
        
      
      - name: install dependencies
        run: npm install
      
      - name: run tests
        run: cd backend && node test_api.js
  
  build: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: setup node.js
        uses: actions/setup-node@v4
       
      
      - name: install dependencies
        run: npm install
      
      - name: build frontend
        run: cd frontend && npm run build
      
      - name: build backend
        run: cd backend && npm run build
  